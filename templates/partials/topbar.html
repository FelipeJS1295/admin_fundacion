<header class="sticky top-0 z-40 border-b border-white/[0.03] bg-slate-950/80 backdrop-blur-md">
  <div class="h-16 max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between gap-4">

    <div class="flex items-center gap-4">
      <button id="btnSidebar" type="button"
        class="md:hidden inline-flex items-center justify-center h-10 w-10 rounded-xl border border-white/[0.05] bg-white/[0.02] text-slate-400 hover:text-white transition-all"
        aria-controls="sidebar" aria-expanded="false" aria-label="Abrir menú">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>

      <div
        class="hidden md:flex items-center gap-3 px-4 py-2 bg-white/[0.02] border border-white/[0.03] rounded-2xl w-64 group focus-within:border-emerald-500/30 transition-all">
        <i data-lucide="search" class="w-3.5 h-3.5 text-slate-600 group-focus-within:text-emerald-500"></i>
        <input type="text" placeholder="Buscar operación..."
          class="bg-transparent border-none text-[11px] text-slate-300 placeholder-slate-600 focus:ring-0 w-full font-medium">
      </div>
    </div>

    <div class="flex items-center gap-3">

      <div
        class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/5 border border-emerald-500/10">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        <span class="text-[10px] font-black uppercase tracking-widest text-emerald-500/80">
          {% if request.state.user %}Sistema en Línea{% else %}Modo Consulta{% endif %}
        </span>
      </div>

      <div class="h-8 w-[1px] bg-white/[0.05] mx-2 hidden sm:block"></div>

      <a href="/logout"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/[0.02] border border-white/[0.05] hover:bg-rose-500/10 hover:border-rose-500/20 hover:text-rose-400 text-slate-400 text-xs font-bold transition-all group">
        <i data-lucide="log-out" class="w-4 h-4 transition-transform group-hover:translate-x-0.5"></i>
        <span class="hidden md:inline">Finalizar Sesión</span>
      </a>

    </div>
  </div>
</header>

<script>
  // Inicializamos los iconos en caso de que el topbar cargue después
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
</script>
