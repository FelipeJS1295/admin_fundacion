<!doctype html>
<html lang="es" class="h-full">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>{% block title %}{{ title or "JAMAROFF — Panel" }}{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            night: {
              DEFAULT: '#020617',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617'
            },
            brand: { DEFAULT: '#10b981', 600: '#059669' }
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    body {
      background-color: #020617;
      color: #cbd5e1;
      scrollbar-gutter: stable;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .nav-link-active {
      background-color: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border-right: 3px solid #10b981;
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body class="h-full antialiased bg-night-950 text-slate-200">

  <div class="min-h-screen flex">

    <aside id="sidebar"
      class="w-64 bg-night-900 border-r border-slate-800/50 flex flex-col shrink-0 transition-all duration-300">
      <div class="p-6 border-b border-slate-800/50">
        <h2 class="text-xl font-black text-white tracking-tighter uppercase italic">JAMAROFF</h2>
        <p class="text-[9px] text-slate-500 font-bold tracking-[0.3em] uppercase mt-1">Home Atelier</p>
      </div>

      <nav class="flex-1 p-4 space-y-2 mt-4">
        <a href="/dashboard"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold hover:bg-slate-800/50 transition-colors {{ 'nav-link-active' if request.url.path == '/dashboard' else '' }}">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
        </a>
        <a href="/finanzas/banco/movimientos"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold hover:bg-slate-800/50 transition-colors">
          <i data-lucide="landmark" class="w-4 h-4"></i> Banco
        </a>
        <a href="/finanzas/caja/movimientos"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold hover:bg-slate-800/50 transition-colors">
          <i data-lucide="banknote" class="w-4 h-4"></i> Caja
        </a>
        <div class="pt-4 pb-2 px-4 text-[9px] font-black text-slate-600 uppercase tracking-widest">Configuración</div>
        <a href="/categorias"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold hover:bg-slate-800/50 transition-colors">
          <i data-lucide="tags" class="w-4 h-4"></i> Categorías
        </a>
      </nav>

      <div class="p-4 border-t border-slate-800/50">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-night-950 border border-slate-800/50">
          <div class="w-8 h-8 rounded-full bg-brand/20 flex items-center justify-center text-brand font-bold text-xs">J
          </div>
          <div class="overflow-hidden">
            <p class="text-[10px] font-bold text-white truncate">Admin Jamaroff</p>
            <p class="text-[8px] text-slate-500 truncate uppercase tracking-tighter">Administrador</p>
          </div>
        </div>
      </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">

      <header
        class="h-16 border-b border-slate-800/50 flex items-center justify-between px-8 bg-night-900/50 backdrop-blur-md sticky top-0 z-30">
        <button id="toggleSidebar" class="p-2 hover:bg-slate-800 rounded-lg md:hidden">
          <i data-lucide="menu" class="w-5 h-5 text-slate-400"></i>
        </button>

        <div class="flex items-center gap-4 ml-auto">
          <button class="p-2 text-slate-400 hover:text-white transition-colors relative">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-night-900"></span>
          </button>
          <div class="h-6 w-[1px] bg-slate-800"></div>
          <a href="/logout"
            class="text-[10px] font-black uppercase text-slate-400 hover:text-rose-500 transition-colors">Cerrar
            Sesión</a>
        </div>
      </header>

      <main id="main" class="flex-1 p-6 md:p-10 max-w-[1600px] mx-auto w-full">
        {% block content %}{% endblock %}
      </main>

      <footer class="p-8 text-center border-t border-slate-900/30">
        <p class="text-[9px] text-slate-700 uppercase tracking-[0.3em] font-black">
          &copy; 2026 JAMAROFF &bull; Powered by
          <a href="https://quantiumcoders.cl" target="_blank" class="hover:text-emerald-500 transition-colors">
            Quantium Coders
          </a>
        </p>
      </footer>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Evitar parámetros vacíos en URL
    document.addEventListener("submit", (e) => {
      const form = e.target;
      if (form.tagName === 'FORM' && form.method.toLowerCase() === "get") {
        [...form.elements].forEach((el) => {
          if (el.name && (el.value === "" || el.value === null)) {
            el.disabled = true;
          }
        });
      }
    });

    // Toggle Sidebar para móvil
    const toggleBtn = document.getElementById('toggleSidebar');
    const sidebar = document.getElementById('sidebar');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('-translate-x-full');
      });
    }
  </script>

  {% block extra_js %}{% endblock %}
</body>

</html>
